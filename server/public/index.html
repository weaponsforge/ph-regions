<!DOCTYPE html>
<html>
<head>
  <title>PH Regions API Docs</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <div id="app"></div>

  <!-- Load the Script -->
  <script
    src="https://cdn.jsdelivr.net/npm/@scalar/api-reference@1.59.3"
    integrity="sha384-irPuG6Dqh5tfvLv4Yl+FeLzXKTA6CfA5aON/ACBCOuvhKXG8yK4umxZg8E7rBxQf"
    crossorigin="anonymous"
  ></script>

  <!-- Initialize the Scalar API Reference -->
  <script>
    Scalar.createApiReference('#app', {
      // The URL of the OpenAPI/Swagger document
      url: '/openapi.json',
      // Avoid CORS issues
      proxyUrl: 'https://proxy.scalar.com',
    })
  </script>
</body>
</html>
